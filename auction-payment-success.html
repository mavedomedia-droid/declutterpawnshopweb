<html lang="en">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#00C853;--green2:#69F0AE;--green3:#B9F6CA;
  --dark:#0A0A0A;--dark2:#111;--dark3:#1A1A1A;--dark4:#242424;--dark5:#2E2E2E;
  --amber:#FFB300;--white:#F9F8F5;--grey:#777;--muted:#444;
}
html,body{width:100%;min-height:100%;overflow-x:hidden;background:var(--dark);color:var(--white);font-family:'DM Sans',sans-serif}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:52px;padding:0 5vw;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,10,10,0.6);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.nav-logo img{height:32px;object-fit:contain}
.nav-badge{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--green);border:1px solid rgba(0,200,83,0.25);border-radius:3px;background:rgba(0,200,83,0.07);padding:3px 8px}

/* ── FULL SCREEN HERO ── */
.hero{
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  padding:60px 0 0;
}

/* ─ dark radial bg ─ */
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 50%, rgba(0,200,83,0.06) 0%, transparent 70%);
  pointer-events:none;
}

/* ─ ring bursts ─ */
.rings{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:1}
.ring{
  position:absolute;border-radius:50%;border:1px solid var(--green);
  transform:translate(-50%,-50%);
  opacity:0;
}
.ring:nth-child(1){width:160px;height:160px;animation:ring-out 1.8s 0.1s ease-out forwards}
.ring:nth-child(2){width:280px;height:280px;animation:ring-out 1.8s 0.25s ease-out forwards}
.ring:nth-child(3){width:420px;height:420px;animation:ring-out 1.8s 0.4s ease-out forwards}
.ring:nth-child(4){width:600px;height:600px;animation:ring-out 1.8s 0.55s ease-out forwards}
.ring:nth-child(5){width:820px;height:820px;animation:ring-out 1.8s 0.7s ease-out forwards}
@keyframes ring-out{
  0%  {opacity:0.7;transform:translate(-50%,-50%) scale(0.1)}
  100%{opacity:0;  transform:translate(-50%,-50%) scale(1)}
}

/* ─ confetti particles ─ */
.confetti{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden;z-index:2}
.p{
  position:absolute;top:-10px;
  width:6px;height:10px;border-radius:2px;
  animation:fall linear forwards;
  opacity:0;
}
@keyframes fall{
  0%  {opacity:1;transform:translateY(0)    rotate(0deg)}
  100%{opacity:0;transform:translateY(110vh) rotate(720deg)}
}

/* ─ gavel SVG illustration ─ */
.gavel-scene{
  position:relative;z-index:10;
  width:220px;height:220px;
  margin-bottom:8px;
  animation:scene-drop 0.7s 0.05s cubic-bezier(0.34,1.4,0.64,1) both;
}
@keyframes scene-drop{
  from{opacity:0;transform:scale(0.5) rotate(-15deg)}
  to  {opacity:1;transform:scale(1)   rotate(0deg)}
}

.gavel-svg{
  width:100%;height:100%;
  filter:drop-shadow(0 0 30px rgba(0,200,83,0.5)) drop-shadow(0 0 60px rgba(0,200,83,0.2));
  animation:gavel-strike 0.5s 0.05s cubic-bezier(0.36,0.07,0.19,0.97) both;
  transform-origin:70% 75%;
}
@keyframes gavel-strike{
  0%  {transform:rotate(-50deg)}
  40% {transform:rotate(12deg)}
  65% {transform:rotate(-5deg)}
  82% {transform:rotate(3deg)}
  100%{transform:rotate(0deg)}
}

/* impact flash */
.impact{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  width:90px;height:12px;
  background:radial-gradient(ellipse, rgba(0,200,83,0.8) 0%, transparent 70%);
  border-radius:50%;
  animation:impact-flash 0.4s 0.3s ease-out both;
}
@keyframes impact-flash{
  0%  {opacity:1;transform:translateX(-50%) scaleX(0.2)}
  40% {opacity:0.8;transform:translateX(-50%) scaleX(1.2)}
  100%{opacity:0;transform:translateX(-50%) scaleX(1)}
}

/* ─ headline ─ */
.won-text{
  position:relative;z-index:10;
  text-align:center;
  padding:0 24px;
  animation:text-up 0.6s 0.5s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes text-up{
  from{opacity:0;transform:translateY(20px)}
  to  {opacity:1;transform:translateY(0)}
}
.won-eyebrow{
  font-size:9px;font-weight:700;letter-spacing:4px;
  text-transform:uppercase;color:var(--green);
  margin-bottom:6px;
}
.won-h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(64px,18vw,96px);
  line-height:0.88;letter-spacing:2px;
  color:var(--white);
}
.won-h1 em{color:var(--green);font-style:normal}
.won-sub{
  font-size:12px;color:var(--grey);
  margin-top:10px;line-height:1.5;
}

/* ── CARD ── */
.card{
  position:relative;z-index:10;
  width:calc(100% - 40px);max-width:400px;
  margin:28px auto 0;
  background:var(--dark2);
  border:1px solid var(--dark4);border-radius:14px;overflow:hidden;
  animation:card-up 0.6s 0.75s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes card-up{
  from{opacity:0;transform:translateY(30px)}
  to  {opacity:1;transform:translateY(0)}
}
.card-stripe{height:2px;background:linear-gradient(90deg,var(--green),var(--green2),var(--green));background-size:200%;animation:ss 2s linear infinite}
@keyframes ss{0%{background-position:0%}100%{background-position:200%}}

/* item row */
.item-row{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--dark4)}
.item-thumb{width:48px;height:48px;border-radius:7px;object-fit:cover;flex-shrink:0;background:var(--dark3);border:1px solid var(--dark4);display:flex;align-items:center;justify-content:center;font-size:20px}
.item-thumb img{width:100%;height:100%;object-fit:cover;border-radius:7px}
.item-info{flex:1;min-width:0}
.item-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-chips{display:flex;gap:5px;margin-top:4px}
.chip{font-size:9px;color:var(--grey);border:1px solid var(--dark5);border-radius:3px;padding:1px 6px}
.item-id-badge{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);flex-shrink:0}

/* stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--dark4)}
.st{padding:12px 8px;text-align:center;border-right:1px solid var(--dark4)}
.st:last-child{border-right:none}
.st-l{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.st-v{font-family:'DM Mono',monospace;font-size:13px;color:var(--white)}
.st-v.g{color:var(--green)}

/* meta */
.meta{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--dark4)}
.mc{padding:12px 14px;border-right:1px solid var(--dark4)}
.mc:last-child{border-right:none}
.mc-l{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.mc-v{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-v.mono{font-family:'DM Mono',monospace;font-size:10px;color:var(--green)}

/* share */
.share{padding:12px 14px;display:flex;gap:8px}
.sbtn{flex:1;padding:10px 6px;border-radius:7px;border:1px solid var(--dark5);background:var(--dark3);color:var(--grey);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:4px;transition:border-color .15s,color .15s}
.sbtn:hover{border-color:var(--white);color:var(--white)}
.sbtn.g{background:var(--green);border-color:var(--green);color:#000;font-weight:700}
.sbtn.g:hover{background:var(--green2);border-color:var(--green2)}

.foot{text-align:center;padding:24px 0 40px;position:relative;z-index:10}
.foot img{height:20px;opacity:0.3}

/* center stat bigger */
.st-center{background:rgba(0,200,83,0.04);border-left:1px solid rgba(0,200,83,0.15);border-right:1px solid rgba(0,200,83,0.15)}
.st-v.big{font-size:22px;font-weight:500;letter-spacing:0.5px}

/* headline cycle fade */
.won-h1{transition:opacity 0.35s ease}
.won-h1.fade{opacity:0}
.won-sub{transition:opacity 0.35s ease}
.won-sub.fade{opacity:0}
</style>
<script src="/js/dps-config.js"></script>

<script>
var GAS_URL=DPS_GAS_URL;

// confetti
(function(){
  var colors=['#00C853','#69F0AE','#FFB300','#FF8F00','#B9F6CA','#F9F8F5'];
  var c=document.getElementById('confetti');
  for(var i=0;i<60;i++){
    var p=document.createElement('div');
    p.className='p';
    p.style.left=Math.random()*100+'vw';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.width=(4+Math.random()*6)+'px';
    p.style.height=(6+Math.random()*10)+'px';
    p.style.borderRadius=Math.random()>0.5?'50%':'2px';
    p.style.animationDuration=(1.2+Math.random()*2)+'s';
    p.style.animationDelay=(0.1+Math.random()*1.2)+'s';
    c.appendChild(p);
  }
})();

function fmt(n){
  n=parseFloat(String(n||0).replace(/[^0-9.]/g,''))||0;
  return '₦'+n.toLocaleString('en-NG');
}
function fmtShort(n){
  n=parseFloat(String(n||0).replace(/[^0-9.]/g,''))||0;
  if(n>=1000000) return '₦'+(n/1000000).toFixed(1).replace(/\.0$/,'')+'m';
  if(n>=1000)    return '₦'+(n/1000).toFixed(0)+'k';
  return '₦'+n;
}

function render(item,ref,buyer,amount){
  var amt=parseFloat(String(amount||item.final||item.bid||0).replace(/[^0-9.]/g,''))||0;
  document.getElementById('item-name').textContent =item.name||'—';
  document.getElementById('item-cat').textContent  =item.cat ||'—';
  document.getElementById('item-cond').textContent =item.cond||'—';
  document.getElementById('item-id').textContent   =item.id  ||'—';
  document.getElementById('s-amt').textContent     =fmtShort(amt);
  document.getElementById('s-bids').textContent    =item.bids||'—';
  document.getElementById('m-buyer').textContent   =buyer||'—';
  document.getElementById('m-ref').textContent     =ref  ||'—';
  if(item.photo&&item.photo.startsWith('http'))
    document.getElementById('item-thumb').innerHTML='<img src="'+item.photo+'" alt="">';
  var url=window.location.href;
  var msg=encodeURIComponent('🏆 I just won a DPS Auction!\n\n📦 '+(item.name||'')+'\n💰 '+fmt(amt)+'\n📌 '+(item.id||'')+'\n\n'+url);
  document.getElementById('sh-wa').href='https://wa.me/?text='+msg;
  document.getElementById('sh-tg').href='https://t.me/share/url?url='+encodeURIComponent(url)+'&text='+encodeURIComponent('🏆 I won a DPS Auction! '+(item.name||''));
}

function copyLink(btn){
  navigator.clipboard.writeText(window.location.href).then(function(){
    var o=btn.textContent;btn.textContent='Copied ✓';
    setTimeout(function(){btn.textContent=o;},2000);
  });
}

];
(function(){
  var h=document.getElementById('cycle-text');
  var s=document.getElementById('cycle-sub');
  var i=0; var runs=0; var maxRuns=phrases.length; // settle after one full loop
  var timer=setInterval(function(){
    // fade out
    h.classList.add('fade'); s.classList.add('fade');
    setTimeout(function(){
      i=(i+1)%phrases.length;
      runs++;
      h.innerHTML=phrases[i].h;
      s.textContent=phrases[i].s;
      h.classList.remove('fade'); s.classList.remove('fade');
      if(runs>=maxRuns){ clearInterval(timer); } // settle after ~5s
    },350);
  },1400);
})();
